<header class="site-header">
  <div class="container">
    <a href="{{ .Site.BaseURL }}" class="site-logo">
      <span class="site-name">{{ .Site.Params.author }}</span>
      <span class="site-label">{{ .Site.Params.label }}</span>
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      <button class="nav-toggle" aria-expanded="false" aria-controls="nav-menu">
        <span class="sr-only">Menu</span>
        <span class="hamburger"></span>
      </button>
      <ul id="nav-menu" class="nav-list">
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}class="active" aria-current="page"{{ end }}>
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
